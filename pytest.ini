[pytest]
testpaths = tests
python_files = test_*.py
; One unified suite. The historical -p no:pytest-qt + per-file ignore
; workaround (pytest-qt's plugin auto-imported PySide6 on every session,
; which corrupted Tk's Tcl interpreter for any tk.Tk() built later in the
; same process on Windows) became unnecessary when the last Tk-based test
; file was retired along with the legacy Tk app.
