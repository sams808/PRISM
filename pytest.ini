[pytest]
testpaths = tests
python_files = test_*.py
; test_qt_shell.py, test_qt_dta.py, and test_qt_simple_plot.py (and any future
; test_qt_<toolname>.py that builds real Qt widgets) are excluded from the
; default run and must be run separately:
; `pytest tests/test_qt_shell.py tests/test_qt_dta.py tests/test_qt_simple_plot.py --override-ini="addopts="`
; Add new Qt-widget test files to this ignore list as they're created
; (M7/M8/M9/M11 will add more) — test_qt_models.py and
; test_qt_settings_store.py are fine to stay in the default run since they
; never import PySide6 at all (pure Python, no actual widgets).
; Root cause: the pytest-qt plugin (installed for test_qt_shell.py's qtbot
; fixture) auto-loads and imports PySide6/Qt on EVERY pytest session by
; default — not something specific to importing test_qt_shell.py itself —
; which corrupts Tk's Tcl interpreter for any tk.Tk() built later in the
; same process on Windows (multiple sequential Tk() roots in one process is
; fine on its own; this is specifically a Qt-then-Tk ordering issue).
; Disabling the plugin by default (-p no:qt) keeps the default run
; pure-Tk-safe; the ignore is kept too since without the plugin the qtbot
; fixture wouldn't exist and those tests would just error instead. See
; tests/conftest.py for the full explanation. Goes away once M6-M13 retire
; the last Tk-based test file.
addopts = -p no:pytest-qt --ignore=tests/test_qt_shell.py --ignore=tests/test_qt_dta.py --ignore=tests/test_qt_simple_plot.py --ignore=tests/test_qt_single_fit.py --ignore=tests/test_qt_multi_fit.py --ignore=tests/test_qt_xas.py --ignore=tests/test_qt_rruff.py --ignore=tests/test_qt_htxrd.py
